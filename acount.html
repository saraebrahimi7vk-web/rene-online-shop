    <title>Rene Online Shop</title>

</head>


<body>


<header>

    <nav>


        <div class="logo">

            <img src="img/WhatsApp Image 2026-07-04 at 5.09.12 PM.jpeg" 
            alt="Rene Online Shop Logo">

            <h1>Rene Online Shop</h1>

        </div>



        <form class="search-box">

            <input type="text" placeholder="search products...">

            <button type="submit">
                <i class="fas fa-search"></i>
            </button>

        </form>



        <ul class="nav-links">


            <li>
                <a href="index.html">
                    <i class="fas fa-home"></i>
                </a>
            </li>


            <li>
                <a href="catagory.html">
                    <i class="fas fa-box"></i>
                </a>
            </li>


            <li>
                <a href="cart.html">
                    <i class="fas fa-cart-shopping"></i>
                </a>
            </li>


            <li>
                <a href="acount.html">
                    <i class="fas fa-user"></i>
                </a>
            </li>


        </ul>



    </nav>



            <div class="cart">

                <i class="fas fa-cart-shopping"></i>

                <span class="cart-count">0</span>

            </div>


        </header>

        <section class="account">

            <div class="account-card">

                <!-- Profile -->
                <div class="profile">
                    <div class="avatar"></div>
                    <div class="status-dot"></div>
                </div>

                <!-- Info stats -->
                <div class="stats">

                    <div class="stat-box">
                        <i class="fa-solid fa-bag-shopping"></i>
                        <span class="value">0</span>
                    </div>

                    <div class="stat-box">
                        <i class="fa-solid fa-heart"></i>
                        <span class="value">0</span>
                    </div>

                    <div class="stat-box">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span class="value">0</span>
                    </div>

                </div>

                <!-- System state -->
                <div class="state-box">
                    <div class="state-item">
                        <span class="label">LOGIN</span>
                        <span class="dot offline"></span>
                    </div>

                    <div class="state-item">
                        <span class="label">PROFILE</span>
                        <span class="dot empty"></span>
                    </div>
                </div>

            </div>

        </section>

            <footer class="footer">
                    <div class="footer-logo">
                        <img src="img/WhatsApp Image 2026-07-04 at 5.09.12 PM.jpeg" alt="logo">
                    </div>
                    <div class="footer-links">
                        <a href="https://www.instagram.com/norjis_99?igsh=MW03NXd5b3M5OTF2MQ=="> <i class="fa-brands fa-instagram"></i></a>
